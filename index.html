<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dangerous</title>

<link rel="icon" type="image/png" href="Logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
}

/* MENU */

nav{
    background:#000;
    padding:20px;
    text-align:center;
    border-bottom:2px solid red;
    position:sticky;
    top:0;
    z-index:1000;
}

nav a{
    color:red;
    text-decoration:none;
    margin:20px;
    font-size:20px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:white;
}

/* HERO */

.hero{
    text-align:center;
    padding-top:20px;
}

.hero img{
    width:100%;
    max-width:900px;
    height:auto;
    display:block;
    margin:-80px auto -180px auto;
}

.hero-content{
    padding:0;
}

.hero-content h1{
    color:red;
    font-size:70px;
    text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 40px red;
    margin-bottom:20px;
}

.hero-content p{
    font-size:28px;
    margin-bottom:30px;
}

/* FOOTER */

footer{
    margin-top:50px;
    border-top:2px solid red;
    text-align:center;
    padding:30px;
    background:#000;
    color:#aaa;
}

</style>
</head>

<body>

<nav>
    <a href="#">Αρχική</a>
    <a href="#">Σχετικά</a>
    <a href="#">Επικοινωνία</a>
</nav>

<div class="hero">

    <img src="foto.png" alt="Dangerous">

    <div class="hero-content">
        <h1>DANGEROUS</h1>
        <p>Welcome To The Dangerous Zone</p>
    </div>

</div>

<footer>
    © 2025 Dangerous
</footer>

</body>
</html>
